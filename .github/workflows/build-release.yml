name: Build & Release ShokoRelay

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    name: Build & attach ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-arm64
            zip_name: ShokoRelay-linux-arm64.zip
          - os: ubuntu-latest
            rid: linux-x64
            zip_name: ShokoRelay-linux-x64.zip
          - os: windows-latest
            rid: win-x64
            zip_name: ShokoRelay-win-x64.zip

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish ShokoRelay/ShokoRelay.csproj -c Release -r ${{ matrix.rid }} --no-self-contained -o publish
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: '1'
          RELEASE_CHANNEL: ${{ github.event.release.prerelease == true && 'Dev' || 'Stable' }}

      - name: Package ZIP (Linux)
        if: runner.os == 'Linux'
        run: |
          rm -rf ShokoRelay || true
          mkdir -p ShokoRelay
          cp -r publish/* ShokoRelay/
          apt-get update && apt-get install -y zip >/dev/null
          zip -r "${{ matrix.zip_name }}" ShokoRelay
          ls -la "${{ matrix.zip_name }}"

      - name: Package ZIP (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force ShokoRelay -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path ShokoRelay | Out-Null
          Copy-Item -Path publish\* -Destination ShokoRelay -Recurse -Force
          Compress-Archive -Path ShokoRelay -DestinationPath "$env:GITHUB_WORKSPACE\${{ matrix.zip_name }}" -Force
          Get-ChildItem -Path "$env:GITHUB_WORKSPACE\${{ matrix.zip_name }}"

      - name: Upload asset to GitHub Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ matrix.zip_name }}
          asset_name: ${{ matrix.zip_name }}
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-manifest:
    name: Update plugin manifest
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          SOURCE_REVISION=$(git rev-parse HEAD)
          RELEASED_AT="${{ github.event.release.published_at }}"
          CHANNEL="${{ github.event.release.prerelease == true && 'Dev' || 'Stable' }}"

          # Download all release assets
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern "ShokoRelay-*.zip"

          # Build archives JSON array
          ARCHIVES_JSON="[]"
          shopt -s nullglob
          for ZIP in ShokoRelay-*.zip; do
            RID="${ZIP#ShokoRelay-}"
            RID="${RID%.zip}"
            CHECKSUM=$(sha256sum "$ZIP" | awk '{ print $1 }')
            URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ZIP}"
            ARCHIVE_ENTRY=$(jq -n \
              --arg runtime "$RID" \
              --arg abstraction "6.0.0" \
              --arg url "$URL" \
              --arg checksum "$CHECKSUM" \
              '{runtime: $runtime, abstraction: $abstraction, url: $url, checksum: $checksum}')
            ARCHIVES_JSON=$(echo "$ARCHIVES_JSON" | jq --argjson entry "$ARCHIVE_ENTRY" '. += [$entry]')
          done

          RELEASE_ENTRY=$(jq -n \
            --arg version "$VERSION" \
            --arg tag "$TAG" \
            --arg source_revision "$SOURCE_REVISION" \
            --arg released_at "$RELEASED_AT" \
            --arg channel "$CHANNEL" \
            --argjson archives "$ARCHIVES_JSON" \
            '{version: $version, tag: $tag, source_revision: $source_revision, released_at: $released_at, channel: $channel, release_notes: null, archives: $archives}')

          jq --argjson release "$RELEASE_ENTRY" '
            .releases |= [ $release ] + (. | map(select(.version != $release.version)))
          ' manifest.json > manifest.json.tmp && mv manifest.json.tmp manifest.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "ci: update manifest for ${TAG}"
          git push origin HEAD:master

