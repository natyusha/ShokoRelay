name: Build & Release ShokoRelay
run-name: "${{ github.event_name == 'workflow_dispatch' && format('Manual Build: {0}', github.event.inputs.tag_name) || format('{0}', github.event.release.name || github.event.release.tag_name) }}"

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag or branch to build from (e.g. v1.0.0 or master)"
        required: true

permissions:
  contents: write

jobs:
  publish:
    name: Build & attach ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-arm64
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag_name || github.event.release.tag_name }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Set Version Variables
        id: vars
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag_name || github.event.release.tag_name }}"

          # Check if the input/release reference looks like a standard tag (e.g. starts with v)
          if [[ "$TAG" =~ ^v[0-9] ]]; then
            echo "is_tag=true" >> $GITHUB_OUTPUT
            VERSION="${TAG#v}"
            # Strip the 4th digit (revision) for filenames (1.0.0.1 -> 1.0.0)
            VERSION_BASE=$(echo "$VERSION" | cut -d'.' -f1-3)

            # Determine if this is a pre-release (Dev channel)
            if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              IS_PRERELEASE=$(gh release view "$TAG" --repo "${{ github.repository }}" --json isPrerelease -q .isPrerelease)
            else
              IS_PRERELEASE="${{ github.event.release.prerelease }}"
            fi

            if [[ "$IS_PRERELEASE" == "true" ]]; then
              echo "file_ver=v${VERSION_BASE}-dev" >> $GITHUB_OUTPUT
              echo "is_dev=true" >> $GITHUB_OUTPUT
            else
              echo "file_ver=v${VERSION_BASE}" >> $GITHUB_OUTPUT
              echo "is_dev=false" >> $GITHUB_OUTPUT
            fi
          else
            # Fallback for branch-based test builds
            echo "is_tag=false" >> $GITHUB_OUTPUT
            echo "file_ver=$TAG" >> $GITHUB_OUTPUT
            echo "is_dev=true" >> $GITHUB_OUTPUT
          fi

      - name: Publish
        run: dotnet publish ShokoRelay/ShokoRelay.csproj -c Release -r ${{ matrix.rid }} --no-self-contained -o publish
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: "1"
          RELEASE_CHANNEL: ${{ steps.vars.outputs.is_dev == 'true' && 'Dev' || 'Stable' }}

      - name: Package ZIP (Linux)
        if: runner.os == 'Linux'
        id: pkg_linux
        shell: bash
        run: |
          ZIP_NAME="ShokoRelay-${{ steps.vars.outputs.file_ver }}_${{ matrix.rid }}.zip"
          cd publish
          zip -r "../$ZIP_NAME" .
          echo "zip_path=$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: Package ZIP (Windows)
        if: runner.os == 'Windows'
        id: pkg_win
        shell: pwsh
        run: |
          $ZipName = "ShokoRelay-${{ steps.vars.outputs.file_ver }}_${{ matrix.rid }}.zip"
          Compress-Archive -Path publish\* -DestinationPath "$env:GITHUB_WORKSPACE\$ZipName" -Force
          echo "zip_path=$ZipName" >> $env:GITHUB_OUTPUT

      - name: Upload asset to GitHub Release
        if: steps.vars.outputs.is_tag == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag_name || github.event.release.tag_name }}
          ZIP_PATH: ${{ runner.os == 'Windows' && steps.pkg_win.outputs.zip_path || steps.pkg_linux.outputs.zip_path }}
        run: |
          gh release upload "$TAG" "$ZIP_PATH" --clobber

      - name: Upload Artifacts
        if: steps.vars.outputs.is_tag == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: ShokoRelay-${{ steps.vars.outputs.file_ver }}-${{ matrix.rid }}
          path: ${{ runner.os == 'Windows' && steps.pkg_win.outputs.zip_path || steps.pkg_linux.outputs.zip_path }}

  update-manifest:
    name: Update plugin manifest
    needs: [publish]
    # Run if triggered by release (published) or tag dispatch.
    if: startsWith(github.event.inputs.tag_name, 'v') || github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Update Manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag_name || github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          SOURCE_REVISION=$(git rev-list -n 1 "$TAG")

          # Extract Shoko.Abstractions version dynamically from csproj
          ABSTRACTION_VERSION=$(grep -oP 'PackageReference Include="Shoko\.Abstractions" Version="\K[^"]+' ShokoRelay/ShokoRelay.csproj | head -1)
          if [ -z "$ABSTRACTION_VERSION" ]; then
            echo "Error: Missing Shoko.Abstractions version in ShokoRelay.csproj"
            exit 1
          fi
          ABSTRACTION_VERSION=$(echo "$ABSTRACTION_VERSION" | cut -d'-' -f1) # Strip the pre-release suffix for manifest compatibility (Remove if pre-release versions are supported in the future)

          # Fetch release metadata from API (including the body for release_notes)
          RELEASE_DATA=$(gh release view "$TAG" --repo "${{ github.repository }}" --json publishedAt,isPrerelease,body)
          RELEASED_AT=$(echo "$RELEASE_DATA" | jq -r .publishedAt)
          IS_PRERELEASE=$(echo "$RELEASE_DATA" | jq -r .isPrerelease)
          RELEASE_NOTES=$(echo "$RELEASE_DATA" | jq -r .body)
          CHANNEL=$([[ "$IS_PRERELEASE" == "true" ]] && echo "Dev" || echo "Stable")

          # Download all release assets
          gh release download "$TAG" --repo "${{ github.repository }}" --pattern "ShokoRelay-v*.zip"

          # Build archives JSON array
          ARCHIVES_JSON="[]"
          shopt -s nullglob
          for ZIP in ShokoRelay-v*.zip; do
            RID=$(echo "$ZIP" | sed -E 's/.*_(.*)\.zip/\1/')
            CHECKSUM=$(sha256sum "$ZIP" | awk '{ print $1 }')
            URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ZIP}"
            ARCHIVE_ENTRY=$(jq -n \
              --arg runtime "$RID" \
              --arg abstraction "$ABSTRACTION_VERSION" \
              --arg url "$URL" \
              --arg checksum "$CHECKSUM" \
              '{runtime: $runtime, abstraction: $abstraction, url: $url, checksum: $checksum}')
            ARCHIVES_JSON=$(echo "$ARCHIVES_JSON" | jq --argjson entry "$ARCHIVE_ENTRY" '. += [$entry]')
          done

          RELEASE_ENTRY=$(jq -n \
            --arg version "$VERSION" \
            --arg tag "$TAG" \
            --arg source_revision "$SOURCE_REVISION" \
            --arg released_at "$RELEASED_AT" \
            --arg channel "$CHANNEL" \
            --arg release_notes "$RELEASE_NOTES" \
            --argjson archives "$ARCHIVES_JSON" \
            '{version: $version, tag: $tag, source_revision: $source_revision, released_at: $released_at, channel: $channel, release_notes: $release_notes, archives: $archives}')

          jq --argjson release "$RELEASE_ENTRY" '
            .releases |= [ $release ] + (. | map(select(.version != $release.version)))
          ' manifest.json > manifest.json.tmp && mv manifest.json.tmp manifest.json

          # Exit cleanly without committing if the manifest hasn't actually changed
          if git diff --quiet manifest.json; then
            echo "manifest.json unchanged, skipping commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "ci: update manifest for ${TAG}"
          git push origin HEAD:master
